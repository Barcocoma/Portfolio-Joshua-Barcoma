services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: joshua-portfolio-backend
    ports:
      - "8001:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    container_name: joshua-portfolio-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
